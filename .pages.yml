media: 
  input: "public/images"
  output: "/images"

content:
  - name: "homepage"
    label: "Page d’accueil"
    type: "file"
    path: "content/index.md"
    filename: "index.md"
    fields:
      - {name: "title", label: "Titre de la page (SEO)", type: "string"}
      - {name: "description", label: "Description de la page (SEO)", type: "string"}
      - {name: "logo", label: "Logo", type: "image"}
      - name: "hero"
        label: "En-tête (Hero)"
        type: "object"
        fields:
          - {name: "title", label: "Titre", type: "string"}
          - {name: "subtitle", label: "Sous-titre", type: "string"}
          - {name: "image", label: "Image de fond", type: "image"}
          - {name: "video_id", label: "ID Vidéo YouTube (optionnel)", type: "string"}
      - name: "sections"
        label: "Sections de présentation"
        type: "object"
        list: true
        fields:
          - {name: "title", label: "Titre", type: "string"}
          - {name: "paragraph1", label: "Paragraphe 1", type: "text"}
          - {name: "paragraph2", label: "Paragraphe 2", type: "text"}
          - {name: "cta_text", label: "Texte du bouton (optionnel)", type: "string"}
          - {name: "cta_link", label: "Lien du bouton (optionnel)", type: "string"}
          - {name: "image", label: "Image", type: "image"}
          - {name: "image_caption", label: "Légende de l'image", type: "string"}
      - name: "how_it_works"
        label: "Comment ça marche ?"
        type: "object"
        fields:
          - {name: "title", label: "Titre de la section", type: "string"}
          - name: "steps"
            label: "Étapes"
            type: "object"
            list: true
            fields:
              - {name: "title", label: "Titre de l'étape", type: "string"}
              - {name: "description", label: "Description", type: "text"}
      - name: "footer_cta"
        label: "Pied de page : Appel à l'action"
        type: "object"
        fields:
          - {name: "title", label: "Titre", type: "string"}
          - {name: "subtitle", label: "Sous-titre", type: "string"}
          - {name: "scarcity", label: "Texte de rareté (ex: places limitées)", type: "string"}
          - {name: "email", label: "Email", type: "string"}
          - {name: "instagram_handle", label: "Texte Instagram", type: "string"}
          - {name: "instagram_link", label: "Lien Instagram", type: "string"}
          - {name: "phone", label: "Téléphone", type: "string"}

  - name: "product"
    label: "Produits"
    type: "collection"
    path: "content/product"
    filename: "{fields.url}.md"
    fields:
      - {name: "url", label: "URL", type: "string"}
      - {name: "collection", label: "Collection", type: "string"}
      - {name: "title", label: "Titre", type: "string"}
      - {name: "description", label: "Description courte", type: "string"}
      - name: "variants"
        label: "Variantes"
        type: "object"
        list: true
        fields:
          - {name: "title", label: "Titre", type: "string"}
          - {name: "price", label: "Prix", type: "string"}
          - {name: "payment_link", label: "Lien de paiement", type: "string"}
          - {name: "color", label: "Couleur", type: "string"}
          - name: "images"
            label: "Images"
            type: "object"
            list: true
            fields:
              - {name: "image", label: "Image", type: "image"}

  - name: "collection"
    label: "Collection"
    type: "collection"
    path: "content/collection"
    filename: "{fields.url}.md"
    fields:
      - {name: "url", label: "URL", type: "string"}
      - {name: "title", label: "Titre", type: "string"}
      - {name: "description", label: "Description courte", type: "string"}
      - {name: "cover_image", label: "Image de couverture", type: "image"}
      - name: "images"
        label: "Images"
        type: "object"
        list: true
        fields:
          - {name: "image", label: "Image", type: "image"}

  - name: "cgu"
    label: "CGU"
    type: "file"
    path: "content/cgu.md"
    filename: "cgu.md"
    fields:
      - {name: "body", label: "Contenu", type: "rich-text"}

  - name: "cgv"
    label: "CGV"
    type: "file"
    path: "content/cgv.md"
    filename: "cgv.md"
    fields:
      - {name: "body", label: "Contenu", type: "rich-text"}